<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boss Fighter</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="favicon.png">
    <script src="script.js" defer></script>
</head>

<body>
    <canvas id="canvas" width="1360" height="768"></canvas>
    <div id="menu">
        <span id="startScreen">
            <h1>DASH||FRAME</h1>
            <h2 onclick="start()">START</h2>
            <h2 onclick="switchScreen()" id="htp">HOW TO PLAY</h2>
            <div>
                <h3>CHALLENGER</h3>
                <h4 id="bossSelect" onclick="cycleBoss()">CHARGER</h4>
                <h3>ATTEMPTS: <span id="attemptCounter">0</span></h3>
            </div>
        </span>
    </div>
    <div id="htpMenu" class="hide">
        <span id="htpScreen">
            <h1>HOW TO PLAY</h1>
            <h3>Press [WASD] to move</h3>
            <h3>Press [SPACE] to dash through attacks</h3>
            <h3>Collect diamonds to attack the boss</h3>
            <h3>don't get hit</h3>
            <h2 onclick="switchScreen()">BACK</h2>
        </span>
    </div>
</body>

</html>
