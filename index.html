<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boss Fighter</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="favicon.png">
    <script src="script.js" defer></script>
</head>

<body>
    <canvas id="canvas" width="1360" height="768"></canvas>
    <div id="menu">
        <span id="startScreen">
            <h1><span class="neonBlue">DASH</span><span class="neonWhite">||</span><span class="neonPurple">FRAME</span></h1>
            <h2 onclick="start()">START</h2>
            <h2 onclick="switchScreen()" id="htp">HOW TO PLAY</h2>
            <div>
                <h3>CHALLENGER</h3>
                <h4 id="bossSelect" onclick="cycleBoss()">CHARGER</h4>
                <h3>ATTEMPTS: <span id="attemptCounter">0</span></h3>
            </div>
        </span>
    </div>
    <div id="htpMenu" class="hide">
        <span id="htpScreen">
            <div id="htpq1">
                <h1 class="neonWhite">HOW TO PLAY</h1>
                <h3 onclick="guide(1)">MOVEMENT</h3>
                <h3 onclick="guide(2)">DASHING</h3>
                <h3 onclick="guide(3)">DIAMONDS</h3>
                <h3 onclick="guide(4)">BOSSES</h3>
                <h2 onclick="switchScreen()">BACK</h2>
            </div>
            <div id="htpq2">Click one of the tabs to learn more</div>
        </span>
    </div>
</body>

</html>
